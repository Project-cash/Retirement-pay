<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h2>Welcome!</h2>

<p>
New students should sign up.


</p>

<hr>

<h3>Sign Up</h3>

<form method="POST">

<input type="username"
       name="username"
       placeholder="Username"
       required>

<input type="password"
       name="password"
       placeholder="Password"
       required>

<button type="submit">

Create Account

</button>

</form>

<p>

Already have an account?

<a href="/login">

Login

</a>

</p>
</div>

</body>
</html>
